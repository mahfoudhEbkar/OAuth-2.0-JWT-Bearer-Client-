name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test (JDK 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Show toolchain
        run: |
          java -version
          mvn -v

      # Build, test, and package on Temurin 8. Because the build JDK is itself
      # Java 8, the Java 8 API surface is enforced automatically - any call to
      # a Java 9+ method (Optional.isEmpty, List.of, Stream.toList, text blocks,
      # etc.) fails to compile here, not at runtime on the production JVM. No
      # separate compat job needed.
      - name: Build, test, package
        run: mvn -B -ntp clean verify

      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: oauth2-jwt-client-war
          path: target/oauth2-jwt-client.war
          if-no-files-found: error
