name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show toolchain
        run: |
          java -version
          mvn -v

      - name: Build, test, package
        run: mvn -B -ntp clean verify

      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: oauth2-jwt-client-war
          path: target/oauth2-jwt-client.war
          if-no-files-found: error

  java8-compat:
    name: Java 8 source-compat check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # --release 8 enforces both Java 8 syntax AND Java 8 API surface.
      # If this job fails, something in the codebase started depending on a
      # JDK 9+ method (e.g. Optional.isEmpty(), List.of(), Stream.toList()).
      - name: Compile with --release 8
        run: >
          mvn -B -ntp clean test
          -Dmaven.compiler.release=8
          -Dmaven.compiler.source=8
          -Dmaven.compiler.target=8
