oauth2:
  client-id: ${OAUTH2_CLIENT_ID}
  token-endpoint: ${OAUTH2_TOKEN_ENDPOINT}
  scope: ${OAUTH2_SCOPE:}
  key-id: ${OAUTH2_KEY_ID:}
  assertion-ttl-seconds: 300
  send-client-id-in-form: false
  keystore:
    path: ${OAUTH2_KEYSTORE_PATH}
    password: ${OAUTH2_KEYSTORE_PASSWORD}
    alias: ${OAUTH2_KEY_ALIAS}
    key-password: ${OAUTH2_KEY_PASSWORD}
  api:
    base-url: ${OAUTH2_API_BASE_URL}
    connect-timeout-ms: 5000
    read-timeout-ms: 15000

server:
  port: 8080

logging:
  level:
    com.odea.oauth2client: INFO
